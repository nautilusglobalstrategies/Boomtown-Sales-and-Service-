<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steve Mitchells Golf Carts</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background: #004d40; color: white; padding: 1rem; text-align: center; }
        .hero { text-align: center; padding: 3rem; background: #e0f2f1; }
        .hero button { padding: 0.8rem 1.5rem; font-size: 1rem; }
        .featured { display: flex; justify-content: center; gap: 1rem; padding: 2rem; flex-wrap: wrap; }
        .cart { border: 1px solid #ccc; padding: 1rem; width: 200px; text-align: center; }
        footer { background: #004d40; color: white; text-align: center; padding: 1rem; }
    </style>
</head>
<body>
    <header>
        <h1>Steve Mitchells Golf Carts</h1>
    </header>
    <div class="hero">
        <h2>Find Your Perfect Golf Cart</h2>
        <button>Browse Carts</button>
    </div>
    <div class="featured">
        <div class="cart">
            <p>Cart 1</p>
        </div>
        <div class="cart">
            <p>Cart 2</p>
        </div>
        <div class="cart">
            <p>Cart 3</p>
        </div>
    </div>
    <footer>
        <p>&copy; 2026 Steve Mitchells Golf Carts</p>
    </footer>
</body>
</html>
